<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>创维ADB随机码计算器 | 在线版</title>
    <!-- 引入轻量级 MD5 库 -->
    <script src="https://cdn.jsdelivr.net/npm/blueimp-md5@2.19.0/js/md5.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', '微软雅黑', Roboto, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            padding: 25px 30px 35px;
            transition: 0.2s;
        }
        h1 {
            font-size: 1.6rem;
            color: #2c3e50;
            text-align: center;
            margin-top: 0;
            margin-bottom: 8px;
        }
        .sub {
            text-align: center;
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-bottom: 25px;
            border-bottom: 1px solid #e9ecef;
            padding-bottom: 12px;
        }
        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
        }
        .input-group label {
            width: 90px;
            font-weight: 600;
            color: #34495e;
        }
        .input-group input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 16px;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
            background: #fefefe;
        }
        .input-group input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
        }
        button {
            width: 100%;
            background: #3498db;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            border-radius: 40px;
            cursor: pointer;
            margin: 15px 0 20px;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #2c3e50;
            transform: scale(0.98);
        }
        .info-box {
            background: #f8f9fa;
            border-left: 5px solid #3498db;
            padding: 12px 16px;
            border-radius: 16px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 0.85rem;
            word-break: break-all;
            white-space: pre-wrap;
            color: #2d3436;
        }
        .result-box {
            background: #eaf7ea;
            border-left: 5px solid #27ae60;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
            margin-top: 15px;
        }
        .result-label {
            font-weight: bold;
            font-size: 1rem;
            color: #2c3e50;
        }
        .result-number {
            font-size: 2.2rem;
            font-weight: 800;
            color: #e67e22;
            letter-spacing: 2px;
            word-break: break-all;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            color: #95a5a6;
            margin-top: 25px;
        }
        @media (max-width: 500px) {
            .container { padding: 20px; }
            .input-group { flex-direction: column; align-items: stretch; }
            .input-group label { margin-bottom: 6px; width: auto; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔢 创维ADB随机码计算工具</h1>
    <div class="sub">在线版 · 原宇飞科技算法</div>

    <div class="input-group">
        <label>📡 MAC 地址：</label>
        <input type="text" id="mac" placeholder="例如 00:11:22:33:44:55" autocomplete="off">
    </div>
    <div class="input-group">
        <label>🎲 随机数：</label>
        <input type="text" id="random" placeholder="设备屏幕上显示的随机数字" autocomplete="off">
    </div>

    <button id="calcBtn">✨ 计 算 ✨</button>

    <div class="info-box" id="infoArea">
        拼接字符串：<br>
        MD5值：
    </div>

    <div class="result-box">
        <div class="result-label">✅ 计算结果（授权码）</div>
        <div class="result-number" id="resultValue">—</div>
    </div>
    <footer>算法与本地版完全一致 · 所有计算均在浏览器完成</footer>
</div>

<script>
    // 计算和值函数（完全还原 Python 逻辑）
    function calculateNumber(md5Str) {
        if (!md5Str || md5Str.length < 32) return 0;
        let beforeStr = md5Str.substring(0, 16);
        let afterStr  = md5Str.substring(16, 32);

        let beforeNum = 0;
        for (let i = 0; i < beforeStr.length; i++) {
            let ch = beforeStr[i];
            // ord(c) - 0x30  即 ASCII码 减去 48，然后转成整数（原代码中int(str(...),10)）
            let val = ch.charCodeAt(0) - 48;
            beforeNum += parseInt(val, 10);
        }

        let afterNum = 0;
        for (let i = 0; i < afterStr.length; i++) {
            let ch = afterStr[i];
            let val = ch.charCodeAt(0) - 48;
            afterNum += parseInt(val, 10);
        }
        return beforeNum * afterNum;
    }

    // 主计算函数
    function compute() {
        const mac = document.getElementById('mac').value.trim();
        const randomVal = document.getElementById('random').value.trim();

        if (!mac || !randomVal) {
            alert('请填写 MAC 地址和随机数');
            return;
        }

        // 拼接字符串（与 Python 完全一致）
        const fullStr = `JSCMCC_SKYWORTH${mac}${randomVal}tianhuaxin@skyworth.com`;
        // 计算 MD5（使用 blueimp-md5 库）
        const md5Hash = md5(fullStr);   // 返回32位小写十六进制
        const finalNum = calculateNumber(md5Hash);

        // 更新界面
        document.getElementById('infoArea').innerHTML = `拼接字符串：<br>${escapeHtml(fullStr)}<br><br>MD5值：<br>${md5Hash}`;
        document.getElementById('resultValue').innerHTML = finalNum;
    }

    // 简单的防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 绑定按钮事件
    document.getElementById('calcBtn').addEventListener('click', compute);
    // 支持回车键（在任意输入框按回车触发计算）
    const inputs = document.querySelectorAll('input');
    inputs.forEach(inp => {
        inp.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') compute();
        });
    });
</script>
</body>
</html>
